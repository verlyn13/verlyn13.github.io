<svg id="braid-timeline-svg" width="1000" height="200" aria-labelledby="braid-title braid-desc" viewBox="0 0 1000 200" xmlns="http://www.w3.org/2000/svg">
  <title id="braid-title">Career Journey: A Braided Path</title>
  <desc id="braid-desc">
    A three-strand braid visualization showing the interweaving of analytical, technical, and experiential threads from 1992 to present.
  </desc>
  <defs id="defs1">
    <filter id="shadow-filter" width="140%" height="140%" x="-20%" y="-20%">
      <feDropShadow dx="0" dy="2" flood-opacity=".25" stdDeviation="2"/>
    </filter>
    <style id="style1">
      /* Timing & Easing */
      #braid-timeline-svg {
        --t-fast: 120ms;
        --t-normal: 200ms;
        --t-slow: 350ms;
        --ease-out: cubic-bezier(0.2, 0, 0, 1);
      }

      /* Strands */
      .strand {
        fill: none;
        stroke-width: 5;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: opacity var(--t-normal) var(--ease-out);
      }
      .strand-analytical { stroke: hsl(212, 85%, 45%); }
      .strand-technical { stroke: hsl(160, 55%, 35%); }
      .strand-experiential { stroke: hsl(22, 90%, 52%); }

      /* Hit Areas - invisible until needed */
      .era-hitarea {
        fill: transparent;
        stroke: none;
        cursor: pointer;
        outline: none;
        transition: fill var(--t-normal) var(--ease-out), stroke var(--t-normal) var(--ease-out);
      }
      .era-hitarea:hover {
        fill: hsla(45, 30%, 50%, 0.08);
      }
      .era-hitarea:active {
        fill: hsla(212, 85%, 45%, 0.1);
      }
      .era-hitarea:focus-visible {
        fill: hsla(212, 85%, 45%, 0.08);
        stroke: hsl(212, 85%, 45%);
        stroke-width: 1.5;
        stroke-opacity: 0.5;
      }
      .era-hitarea.active {
        fill: hsla(212, 85%, 45%, 0.08);
      }
      /* Slower exit transition */
      .era-hitarea:not(:hover):not(:active):not(.active) {
        transition: fill var(--t-slow) var(--ease-out);
      }

      /* Labels */
      .era-label {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 11px;
        font-weight: 600;
        fill: hsl(220, 18%, 18%);
        text-anchor: middle;
        cursor: pointer;
        outline: none;
        transition: fill var(--t-fast) var(--ease-out);
      }
      .era-label:hover,
      .era-label:focus-visible,
      .era-label.active {
        fill: hsl(212, 85%, 45%);
      }
      .era-label:active {
        fill: hsl(212, 85%, 38%);
      }

      /* Year markers - non-interactive */
      .year-marker {
        font-family: ui-monospace, monospace;
        font-size: 9px;
        fill: hsl(220, 12%, 45%);
        text-anchor: middle;
        pointer-events: none;
        user-select: none;
      }

      /* Convergence ring with subtle pulse */
      .convergence-ring {
        fill: none;
        stroke: hsl(220, 18%, 18%);
        stroke-width: 1.5;
      }
      #convergence-inner { opacity: 0.3; }
      #convergence-outer {
        opacity: 0.12;
        transform-origin: 980px 68px;
        animation: convergence-pulse 3s ease-in-out infinite;
      }
      @keyframes convergence-pulse {
        0%, 100% { opacity: 0.08; transform: scale(1); }
        50% { opacity: 0.15; transform: scale(1.05); }
      }

      /* Accessibility: reduce motion */
      @media (prefers-reduced-motion: reduce) {
        #convergence-outer { animation: none; opacity: 0.12; }
        .strand, .era-hitarea, .era-label { transition-duration: 0.01ms !important; }
      }

      /* High contrast mode */
      @media (prefers-contrast: high) {
        .era-hitarea:hover { fill: hsla(212, 85%, 45%, 0.2); }
        .era-hitarea:focus-visible { stroke-width: 2; stroke-opacity: 0.8; }
        .era-label:hover, .era-label.active { fill: hsl(212, 100%, 35%); }
      }
    </style>
  </defs>
  <g id="layer-hitareas">
    <rect id="hitarea-wisconsin" width="135" height="115" x="20" y="30" class="era-hitarea" data-era="wisconsin" rx="4"/>
    <rect id="hitarea-duluth" width="115" height="115" x="155" y="30" class="era-hitarea" data-era="duluth" rx="4"/>
    <rect id="hitarea-california" width="130" height="115" x="270" y="30" class="era-hitarea" data-era="california" rx="4"/>
    <rect id="hitarea-peacecorps" width="90" height="115" x="400" y="30" class="era-hitarea" data-era="peacecorps" rx="4"/>
    <rect id="hitarea-montana" width="205" height="115" x="490" y="30" class="era-hitarea" data-era="montana" rx="4"/>
    <rect id="hitarea-cairo" width="55" height="115" x="695" y="30" class="era-hitarea" data-era="cairo" rx="4"/>
    <rect id="hitarea-alaska" width="230" height="115" x="750" y="30" class="era-hitarea" data-era="alaska" rx="4"/>
  </g>
  <g id="layer-strands">
    <g id="strand-experiential-group">
      <path id="strand-E" d="M20.34 53.4c16 0 29.28 1.92 45.381 9.085M80 75.403c13.2 12.479 105.439 10.68 185.439 30.68 40 12 70.481 9.159 85.481-3.841m8.839-14.618c19.124-24.942 68.484-22.904 91.484-29.904 20-8 102.154-21.038 126.64 2.72m15.978 17.677c30 20 106.799 33.64 166.799 18.64 25-6 100.753 20.115 110.073-26.84m4.76-20.738c15-12 86.233-3.881 101.233 1.119" class="strand strand-experiential"/>
    </g>
    <g id="strand-technical-group">
      <path id="strand-T" d="M20 80c27-9 54-14 70-10 3 1 5 2 5 2 20 8 55-20 95-22m-1.02 0c30-3 42 0 47 5m10.539 12.238C266 82 321.359 90.64 381.359 98.64c20 3 62.72 3.16 102.72-11.84 40-5 92.185 23.667 117.28 6.84m10.54-13.598c25-18 78.64 6.36 138.64 3.36 40-2 92.677-8.201 107.238-7.762m26.856-3.06c25 2 63.117 36.318 93.117 36.318" class="strand strand-technical"/>
    </g>
    <g id="strand-analytical-group">
      <path id="strand-A" d="M17.28 110c30 0 50.482-8.2 90.482-13.2 25-3 34.801 17.917 56 0m12.918-14.62c20.44-18.839 52.238-18.8 82.238-21.8C300 58 421.475 38.402 440 55m10.879 11.898c17.28 19.52 103.117 5.96 183.117-2.04 96.15-4.807 181.577-3.058 279.126-5.266 30.424-.69 61.5 19.024 65.35 19.024" class="strand strand-analytical"/>
    </g>
  </g>
  <g id="layer-convergence">
    <circle id="convergence-inner" cx="980" cy="68" r="8" class="convergence-ring"/>
    <circle id="convergence-outer" cx="980" cy="68" r="14" class="convergence-ring" opacity=".12"/>
  </g>
  <g id="layer-labels">
    <text id="label-wisconsin" x="87" y="158" class="era-label" data-era="wisconsin">Work ethic</text>
    <text id="label-duluth" x="212" y="158" class="era-label" data-era="duluth">First proofs</text>
    <text id="label-california" x="335" y="158" class="era-label" data-era="california">Identity</text>
    <text id="label-peacecorps" x="445" y="158" class="era-label" data-era="peacecorps">Service</text>
    <text id="label-montana" x="592" y="158" class="era-label" data-era="montana">Deep theory</text>
    <text id="label-cairo" x="722" y="158" class="era-label" data-era="cairo">International</text>
    <text id="label-alaska" x="865" y="158" class="era-label" data-era="alaska">Synthesis</text>
  </g>
  <g id="layer-years">
    <text id="year-1992" x="20" y="178" class="year-marker">1992</text>
    <text id="year-1998" x="155" y="178" class="year-marker">'98</text>
    <text id="year-2001" x="270" y="178" class="year-marker">'01</text>
    <text id="year-2005" x="400" y="178" class="year-marker">'05</text>
    <text id="year-2008" x="490" y="178" class="year-marker">'08</text>
    <text id="year-2015" x="695" y="178" class="year-marker">'15</text>
    <text id="year-2017" x="750" y="178" class="year-marker">'17</text>
    <text id="year-now" x="980" y="178" class="year-marker">now</text>
  </g>
</svg>
