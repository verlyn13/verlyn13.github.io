    </filter>
    <style
       id="style1">
      .strand {
        fill: none;
        stroke-width: 5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .strand-analytical { stroke: hsl(212, 85%, 45%); }
      .strand-technical { stroke: hsl(160, 55%, 35%); }
      .strand-experiential { stroke: hsl(22, 90%, 52%); }
      .strand-over { filter: url(#shadow-filter); }

      .era-hitarea {
        fill: transparent;
        cursor: pointer;
      }
      .era-hitarea:hover { fill: hsla(220, 18%, 18%, 0.05); }

      .era-label {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 11px;
        font-weight: 600;
        fill: hsl(220, 18%, 18%);
        text-anchor: middle;
      }

      .year-marker {
        font-family: ui-monospace, monospace;
        font-size: 9px;
        fill: hsl(220, 12%, 45%);
        text-anchor: middle;
      }

      .convergence-ring {
        fill: none;
        stroke: hsl(220, 18%, 18%);
        stroke-width: 1.5;
        opacity: 0.3;
      }
    </style>
