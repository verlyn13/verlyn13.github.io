<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Brand tokens (hex of): paper #F9F8F5 / paper-deep #F2F1EE, ink #262B36, muted #656E81,
       accent #116CD4, accent-ink #0F60BD, accent-2 #288A6A, border #DBDFE6 -->
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F9F8F5"/>
      <stop offset="1" stop-color="#F2F1EE"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#paper)"/>
  <rect x="0" y="0" width="14" height="630" fill="#116CD4"/>
  <rect x="88" y="72" width="1024" height="486" fill="none" stroke="#DBDFE6" stroke-width="2"/>

  <text x="128" y="176" font-family="Helvetica, Arial, sans-serif" font-size="27" letter-spacing="3"
        fill="#0F60BD" font-weight="700">JVJOHNSON.DEV</text>

  <text x="126" y="272" font-family="Helvetica, Arial, sans-serif" font-size="80"
        fill="#262B36" font-weight="700">Jeffrey V. Johnson, Ph.D.</text>

  <text x="128" y="342" font-family="Helvetica, Arial, sans-serif" font-size="43"
        fill="#262B36" font-weight="400">Independent researcher and systems builder</text>

  <rect x="128" y="392" width="84" height="5" fill="#288A6A"/>

  <text x="128" y="452" font-family="Helvetica, Arial, sans-serif" font-size="29"
        fill="#656E81" font-weight="400">Turning research questions into working systems.</text>
  <text x="128" y="494" font-family="Helvetica, Arial, sans-serif" font-size="29"
        fill="#656E81" font-weight="400">Agentic systems, infrastructure, applied AI.</text>

  <text x="1072" y="522" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="26"
        fill="#656E81" font-weight="400">Homer, Alaska</text>
</svg>
