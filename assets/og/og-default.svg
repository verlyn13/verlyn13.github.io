<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <title>Jeffrey V. Johnson portfolio social preview</title>
  <!-- Current semantic palette from tokens/*.tokens.json. -->
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F9F8F6"/>
      <stop offset="1" stop-color="#F5F3F0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#paper)"/>
  <rect x="0" y="0" width="14" height="630" fill="#2256BF"/>
  <rect x="88" y="72" width="1024" height="486" fill="none" stroke="#DBDFE6" stroke-width="2"/>

  <text x="128" y="176" font-family="Helvetica, Arial, sans-serif" font-size="27" letter-spacing="3"
        fill="#1F4EAD" font-weight="700">JVJOHNSON.DEV</text>

  <text x="126" y="272" font-family="Helvetica, Arial, sans-serif" font-size="80"
        fill="#262B36" font-weight="700">Jeffrey V. Johnson, Ph.D.</text>

  <text x="128" y="338" font-family="Helvetica, Arial, sans-serif" font-size="39"
        fill="#262B36" font-weight="400">Building infrastructure for model evaluation</text>
  <text x="128" y="384" font-family="Helvetica, Arial, sans-serif" font-size="39"
        fill="#262B36" font-weight="400">and agent systems</text>

  <rect x="128" y="414" width="84" height="5" fill="#2A7E5B"/>

  <text x="128" y="468" font-family="Helvetica, Arial, sans-serif" font-size="27"
        fill="#656E81" font-weight="400">Clear specifications, explicit permissions, reproducible environments.</text>
  <text x="128" y="506" font-family="Helvetica, Arial, sans-serif" font-size="27"
        fill="#656E81" font-weight="400">Automated checks and evidence that can be reviewed.</text>

  <text x="1072" y="522" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="26"
        fill="#656E81" font-weight="400">Homer, Alaska</text>
</svg>
