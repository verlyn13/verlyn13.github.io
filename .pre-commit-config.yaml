# Automated repo hygiene — single source of truth.
# CI (.github/workflows/hygiene.yml) runs `pre-commit run --all-files`, so these
# are enforced on every push whether or not you ran `pre-commit install` locally.
# Optional local install:  pipx install pre-commit && pre-commit install
minimum_pre_commit_version: "3.5.0"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: [--maxkb=10240]
  # GitHub Actions static analysis — no insecure workflow reaches the public deploy path (D15).
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.26.1
    hooks:
      - id: zizmor
  # Design-system: forbid raw color literals above the token layer (pure Node, no node_modules).
  - repo: local
    hooks:
      - id: no-raw-values
        name: design-system — no raw colors above the token layer
        entry: node scripts/check-no-raw-values.mjs
        language: system
        files: ^assets/jeffrey\.css$
        pass_filenames: false
