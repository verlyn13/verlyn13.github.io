# Hardened per fleet-modernization handback v0.3 §2.2 (resolves Q6).
# - cooldown: don't adopt a release until it has aged (defeats "bot pulls a malicious
#   release minutes after publish"). Applies to VERSION updates only — genuine CVE security
#   PRs still arrive immediately via Dependabot security alerts (enabled at the repo level).
# - groups: fewer PRs to review (solo-maintainer cognitive load).
# - NO auto-merge anywhere — deliberate; a human reviews every dependency change.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(ci)
    cooldown:
      # GitHub Actions does not support semver-specific cooldown keys; default-days
      # applies to all version updates for this ecosystem.
      default-days: 7        # release must be >=7 days old (IaC scanners flag <7)
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      actions-major:
        patterns: ["*"]
        update-types: ["major"]
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
    cooldown:
      default-days: 7
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
