name: Hygiene

# Enforces .pre-commit-config.yaml on every push/PR, so hygiene holds even
# when no one ran `pre-commit install` locally. This is the can't-be-forgotten
# layer: line endings, trailing whitespace, final newline, YAML/JSON/TOML
# validity, merge-conflict markers, oversized files.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: pre-commit (all files)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1
