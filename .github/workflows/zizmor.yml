# GitHub Actions static analysis (zizmor) → SARIF to code scanning.
# Public path only (see modernization report D15): a bad/insecure workflow must not reach prod.
name: zizmor

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF to the code-scanning / Security tab
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02  # v0.6.0
