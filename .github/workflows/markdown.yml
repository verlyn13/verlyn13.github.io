name: Markdown link check

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "**/*.html"
      - ".github/workflows/markdown.yml"
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.html"
      - ".github/workflows/markdown.yml"

permissions:
  contents: read

jobs:
  links:
    name: Check links + cross-references
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2
        with:
          # Internal cross-reference drift across governance markdown + deployed HTML
          # (resolves AAF-VGH-002 broken-ref debt). Offline: validates local file/anchor
          # links, resolving site-absolute "/..." paths via --root-dir. External URLs are
          # skipped — they were flaky (e.g. claude.ai 403s bots) and aren't this check's
          # purpose. Archival/sandbox dirs are excluded, matching biome.json.
          # (lychee >=0.23 removed --exclude-mail; mail is excluded by default.)
          args: >-
            --no-progress
            --offline
            --root-dir ${{ github.workspace }}
            --exclude-path node_modules
            --exclude-path dist
            --exclude-path experiments
            --exclude-path audit
            --exclude-path profile
            './**/*.md'
            './**/*.html'
          fail: true
