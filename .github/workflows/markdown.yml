name: Markdown link check

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "**/*.html"
      - ".github/workflows/markdown.yml"
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.html"
      - ".github/workflows/markdown.yml"

permissions:
  contents: read

jobs:
  links:
    name: Check links + cross-references
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2
        with:
          # Scan both governance markdown and the deployed HTML pages
          # so docs-cross-reference + content-pipeline reference drift
          # both surface in CI (resolves AAF-VGH-002 broken-ref debt
          # going forward; implements proposed FF docs-cross-reference-check).
          args: >-
            --no-progress
            --exclude-loopback
            --exclude-mail
            --exclude-path node_modules
            --exclude-path dist
            './**/*.md'
            './**/*.html'
          fail: true
